<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Gauntlet Tiers</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<nav>
  <a href="../index.html" class="nav-brand">Gauntlet<span> Tiers</span></a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="tierlist.html">Tier List</a></li>
    <li><a href="tournaments.html">Tournaments</a></li>
    <li><a href="community.html">Community</a></li>
    <li><a href="support.html">Support</a></li>
  </ul>
  <div class="nav-auth">
    <div class="nav-user">
      <a href="profile.html" class="btn-ghost"><span class="nav-username">Profile</span></a>
      <button class="btn-danger logout-btn">Logout</button>
    </div>
    <div class="nav-login">
      <a href="login.html" class="btn-ghost">Login</a>
    </div>
  </div>
</nav>

<main>
  <div class="auth-page">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="subtitle">Join the competitive PvP community</p>

      <div class="alert error" id="error-msg"></div>
      <div class="alert success" id="success-msg"></div>

      <div class="form-group">
        <label>Minecraft Username</label>
        <input type="text" id="username" placeholder="YourIGN" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" />
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="••••••••" />
      </div>

      <button class="btn-primary" id="signup-btn" style="width:100%;padding:0.75rem;">
        Create Account
      </button>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>
</main>

<script src="../js/auth.js"></script>
<script>
  document.getElementById('signup-btn').addEventListener('click', async () => {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;
    const errEl = document.getElementById('error-msg');
    const successEl = document.getElementById('success-msg');
    const btn = document.getElementById('signup-btn');

    errEl.classList.remove('show');
    successEl.classList.remove('show');

    if (!username || !email || !password || !confirm) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.classList.add('show');
      return;
    }
    if (password.length < 8) {
      errEl.textContent = 'Password must be at least 8 characters.';
      errEl.classList.add('show');
      return;
    }
    if (password !== confirm) {
      errEl.textContent = 'Passwords do not match.';
      errEl.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = 'Creating account… <span class="spinner"></span>';

    try {
      await register(username, email, password);
      window.location.href = '../index.html';
    } catch (e) {
      errEl.textContent = e.message || 'Could not create account. Try again.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });
</script>
</body>
</html>
